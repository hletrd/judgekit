# Judge Docker images for local development
#
# Build all images with latest tag:
#   docker compose build
#
# Build with git SHA version tag (SEC-M13):
#   GIT_SHA=$(git rev-parse --short HEAD) docker compose build
#   This tags each image as both `judge-<lang>:latest` and `judge-<lang>:<GIT_SHA>`
#
# Build a single image:
#   docker compose build judge-cpp
#
# Push all images (if using a registry):
#   docker compose push

services:
  judge-cpp:
    build:
      context: .
      dockerfile: docker/Dockerfile.judge-cpp
    image: judge-cpp:${GIT_SHA:-latest}

