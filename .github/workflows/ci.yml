name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AUTH_SECRET: ci-auth-secret-32-characters-minimum
  AUTH_URL: http://localhost:3110
  JUDGE_AUTH_TOKEN: ci-judge-auth-token-32-characters-minimum

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', '**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Run production build
        run: npm run build

      - name: Build JVM judge image
        run: docker build -t judge-jvm -f docker/Dockerfile.judge-jvm .

      - name: Smoke test JVM judge image
        run: |
          workspace="$(mktemp -d)"
          export WORKSPACE="$workspace"

          python3 - <<'PY'
          import os
          from pathlib import Path

          workspace = Path(os.environ["WORKSPACE"])
          workspace.joinpath("solution.java").write_text(
              """public class Main {
              public static void main(String[] args) throws Exception {
                  String input = new String(System.in.readAllBytes()).trim();
                  if (input.isEmpty()) return;
                  String[] parts = input.split("\\s+");
                  System.out.println(Integer.parseInt(parts[0]) + Integer.parseInt(parts[1]));
              }
          }
          """,
              encoding="utf-8",
          )
          workspace.joinpath("solution.kt").write_text(
              """fun main() {
                  val tokens = generateSequence(::readlnOrNull)
                      .flatMap { it.split(Regex("\\\\s+")).asSequence() }
                      .filter { it.isNotBlank() }
                      .toList()
                  if (tokens.size >= 2) {
                      println(tokens[0].toInt() + tokens[1].toInt())
                  }
          }
          """,
              encoding="utf-8",
          )
          PY

          java_output="$(docker run --rm -v "$workspace:/workspace" -w /workspace judge-jvm sh -lc "mkdir -p /workspace/out && cp /workspace/solution.java /workspace/Main.java && javac --release 25 -encoding UTF-8 -d /workspace/out /workspace/Main.java && printf '1 2\n' | java -cp /workspace/out Main")"
          [ "$java_output" = "3" ]

          kotlin_output="$(docker run --rm -v "$workspace:/workspace" -w /workspace judge-jvm sh -lc "kotlinc /workspace/solution.kt -include-runtime -d /workspace/solution.jar && printf '1 2\n' | java -jar /workspace/solution.jar")"
          [ "$kotlin_output" = "3" ]

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', '**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Reset SQLite database
        run: |
          mkdir -p data
          rm -f data/judge.db data/judge.db-shm data/judge.db-wal

      - name: Apply database schema
        run: npm run db:push

      - name: Seed database
        run: npm run seed

      - name: Synchronize language configs
        run: npm run languages:sync

      - name: Verify backup and restore scripts
        run: |
          npm run backup:db -- "$RUNNER_TEMP/online-judge-backup.db"
          npm run backup:verify -- "$RUNNER_TEMP/online-judge-backup.db" "$RUNNER_TEMP/online-judge-restore.db"

      - name: Build app for Playwright webServer
        run: npm run build

      - name: Run Playwright test suite
        run: npx playwright test

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            .sisyphus/evidence/playwright/html-report
            .sisyphus/evidence/playwright/artifacts
          if-no-files-found: ignore
          retention-days: 14
